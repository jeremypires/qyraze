<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Qyraze</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand brand-logo-only" href="/" aria-label="Retour à l’accueil">
        <img class="brand-mark" src="/logo.png" alt="Qyraze" />
      </a>
      <div class="nav-links">
        <a href="/">Accueil</a>
      </div>
    </div>
  </nav>

  <main class="marketing-page active">
    <section class="section" style="min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 80px 20px;">
      <div class="login-card" style="width: 100%; max-width: 460px; margin: 0 auto;">
        <div class="login-badge">Accès sécurisé</div>
        <h1 class="login-title">Connexion Qyraze</h1>
        <p class="login-subtitle">Entre ton email et ton mot de passe, puis valide le code reçu par email.</p>

        <form id="loginForm" class="login-form">
          <input id="loginEmail" class="login-input" type="email" placeholder="Email admin" autocomplete="email" required />
          <input id="loginPassword" class="login-input" type="password" placeholder="Mot de passe" autocomplete="current-password" required />
          <button id="loginSubmit" class="login-submit" type="submit">Se connecter</button>
        </form>

        <form id="codeForm" class="login-form" style="display: none; margin-top: 14px;">
          <p class="login-subtitle" style="margin-bottom: 10px;">Code envoyé par email. Entre le code reçu au format 1234-5678.</p>
          <input id="loginCode" class="login-input" type="text" placeholder="Code 1234-5678" inputmode="numeric" autocomplete="one-time-code" />
          <button id="codeSubmit" class="login-submit" type="submit">Valider le code</button>
          <button id="restartLogin" class="app-btn-secondary" type="button" style="width: 100%; margin-top: 8px;">Recommencer</button>
        </form>

        <p id="loginError" class="login-error"></p>
        <a class="login-back" href="/">← Retour à l’accueil</a>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('loginEmail');
    const passwordInput = document.getElementById('loginPassword');
    const errorEl = document.getElementById('loginError');
    const submitBtn = document.getElementById('loginSubmit');
    const codeForm = document.getElementById('codeForm');
    const codeInput = document.getElementById('loginCode');
    const codeSubmit = document.getElementById('codeSubmit');
    const restartLogin = document.getElementById('restartLogin');
    let currentChallenge = null;

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      errorEl.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Envoi du code...';

      try {
        const startResponse = await fetch('/api/login-notify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: emailInput.value.trim(),
            password: passwordInput.value,
          }),
        });

        const startData = await startResponse.json().catch(() => ({}));

        if (!startResponse.ok) {
          throw new Error(startData.error || 'Connexion refusée');
        }

        currentChallenge = startData.challenge;
        form.style.display = 'none';
        codeForm.style.display = 'grid';
        codeInput.focus();
        errorEl.style.color = '#3dd68c';
        errorEl.textContent = startData.message || 'Code envoyé. Vérifie ta boîte mail.';
      } catch (error) {
        errorEl.style.color = '#ff5f5f';
        errorEl.textContent = error.message || 'Connexion impossible';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Se connecter';
      }
    });

    codeForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      errorEl.textContent = '';
      codeSubmit.disabled = true;
      codeSubmit.textContent = 'Vérification...';

      try {
        const code = codeInput.value.trim();

        if (!currentChallenge) {
          throw new Error('Session expirée. Recommence la connexion.');
        }

        if (!/^\d{4}-\d{4}$/.test(code)) {
          throw new Error('Format invalide. Exemple : 1234-5678');
        }

        const verifyResponse = await fetch('/api/login-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            challenge: currentChallenge,
            code,
          }),
        });

        const verifyData = await verifyResponse.json().catch(() => ({}));

        if (!verifyResponse.ok) {
          throw new Error(verifyData.error || 'Code incorrect');
        }

        window.location.href = '/app';
      } catch (error) {
        errorEl.style.color = '#ff5f5f';
        errorEl.textContent = error.message || 'Connexion impossible';
      } finally {
        codeSubmit.disabled = false;
        codeSubmit.textContent = 'Valider le code';
      }
    });

    restartLogin.addEventListener('click', () => {
      currentChallenge = null;
      codeInput.value = '';
      errorEl.textContent = '';
      errorEl.style.color = '#ff5f5f';
      codeForm.style.display = 'none';
      form.style.display = 'grid';
      passwordInput.value = '';
      passwordInput.focus();
    });
  </script>
</body>
</html>
