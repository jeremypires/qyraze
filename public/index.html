<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendrier Google</title>
  <style>
    /* Existing CSS */
    .calendar-item-time {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .calendar-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .calendar-view-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .calendar-switch-btn {
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .calendar-switch-btn.active {
      color: var(--white);
      border-color: rgba(99,210,255,0.35);
      background: rgba(99,210,255,0.08);
    }

    .calendar-switch-btn:hover {
      border-color: rgba(255,255,255,0.16);
      color: var(--white);
    }

    .calendar-range-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .calendar-agenda-wrap {
      margin-top: 8px;
    }

    .calendar-agenda-day,
    .calendar-agenda-week {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.015);
    }

    .calendar-agenda-header {
      display: grid;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }

    .calendar-agenda-header.week {
      grid-template-columns: 76px repeat(7, minmax(0, 1fr));
    }

    .calendar-agenda-header.day {
      grid-template-columns: 76px 1fr;
    }

    .calendar-agenda-head-cell {
      padding: 10px 8px;
      min-height: 56px;
      border-left: 1px solid rgba(255,255,255,0.05);
    }

    .calendar-agenda-head-cell:first-child {
      border-left: none;
    }

    .calendar-day-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .calendar-day-date {
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
    }

    .calendar-agenda-body {
      position: relative;
    }

    .calendar-agenda-body.week {
      display: grid;
      grid-template-columns: 76px repeat(7, minmax(0, 1fr));
      min-height: 720px;
    }

    .calendar-agenda-body.day {
      display: grid;
      grid-template-columns: 76px 1fr;
      min-height: 720px;
    }

    .calendar-time-column {
      position: relative;
      border-right: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.01);
    }

    .calendar-time-slot {
      position: absolute;
      left: 0;
      width: 100%;
      height: 60px;
      transform: translateY(-50%);
      padding-left: 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted2);
    }

    .calendar-grid-area {
      position: relative;
    }

    .calendar-grid-lines {
      position: absolute;
      inset: 0;
    }

    .calendar-grid-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255,255,255,0.05);
    }

    .calendar-day-column {
      position: relative;
      border-left: 1px solid rgba(255,255,255,0.05);
    }

    .calendar-day-column:first-child {
      border-left: none;
    }

    .calendar-events-layer {
      position: absolute;
      inset: 0;
      padding: 6px;
    }

    .calendar-event-block {
      position: absolute;
      left: 6px;
      right: 6px;
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255,115,77,0.28);
      border: 1px solid rgba(255,115,77,0.45);
      box-shadow: inset 3px 0 0 rgba(255,115,77,0.9);
      overflow: hidden;
    }

    .calendar-event-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .calendar-event-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.82);
      line-height: 1.4;
    }

    .calendar-all-day-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(99,210,255,0.12);
      border: 1px solid rgba(99,210,255,0.22);
      color: var(--white);
      font-size: 11px;
      margin: 8px 8px 0 0;
    }

    .calendar-all-day-row {
      padding: 8px 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    @media (max-width: 980px) {
      .calendar-agenda-header.week,
      .calendar-agenda-body.week {
        min-width: 860px;
      }

      .calendar-agenda-wrap {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MC2DR98S"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div class="calendar-panel">
    <div class="calendar-toolbar">
      <div>
        <div class="app-section-title">Calendrier</div>
        <div class="calendar-range-label" id="calendarRangeLabel">Semaine en cours</div>
      </div>
      <div class="calendar-view-switch">
        <button class="calendar-switch-btn active" id="calendarWeekBtn" type="button">Semaine</button>
        <button class="calendar-switch-btn" id="calendarDayBtn" type="button">Jour</button>
      </div>
    </div>
    <div class="calendar-agenda-wrap" id="googleEventsList">
      <div class="calendar-empty">Connecte Google Calendar pour afficher les rendez-vous des 7 prochains jours.</div>
    </div>
  </div>

  <script>
    // Existing script content

    const googleEventsList = document.getElementById('googleEventsList');
    const calendarWeekBtn = document.getElementById('calendarWeekBtn');
    const calendarDayBtn = document.getElementById('calendarDayBtn');
    const calendarRangeLabel = document.getElementById('calendarRangeLabel');
    let calendarViewMode = 'week';
    let cachedGoogleEvents = [];

    function formatEventDateTime(value) {
      if (!value) return '';
      const date = new Date(value);
      return new Intl.DateTimeFormat('fr-FR', {
        day: '2-digit',
        month: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
      }).format(date);
    }

    function formatHourMinute(date) {
      return new Intl.DateTimeFormat('fr-FR', {
        hour: '2-digit',
        minute: '2-digit',
      }).format(date);
    }

    function startOfToday() {
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      return now;
    }

    function startOfWeek(date) {
      const copy = new Date(date);
      const day = copy.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      copy.setDate(copy.getDate() + diff);
      copy.setHours(0, 0, 0, 0);
      return copy;
    }

    function addDays(date, days) {
      const copy = new Date(date);
      copy.setDate(copy.getDate() + days);
      return copy;
    }

    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    function hoursArray() {
      return Array.from({ length: 12 }, (_, i) => i + 11);
    }

    function buildGridLines() {
      return hoursArray()
        .map((hour, index) => {
          const top = index * 60;
          return `<div class="calendar-grid-line" style="top:${top}px"></div>`;
        })
        .join('');
    }

    function buildTimeColumn() {
      return `
        <div class="calendar-time-column">
          ${hoursArray()
            .map((hour, index) => `<div class="calendar-time-slot" style="top:${index * 60}px">${String(hour).padStart(2, '0')}:00</div>`)
            .join('')}
        </div>
      `;
    }

    function normalizeEvent(event) {
      const isAllDay = !!event.start?.date && !event.start?.dateTime;
      const start = new Date(event.start?.dateTime || event.start?.date);
      let end = new Date(event.end?.dateTime || event.end?.date || event.start?.dateTime || event.start?.date);

      if (isAllDay) {
        end = new Date(start);
        end.setHours(23, 59, 59, 999);
      }

      return {
        summary: event.summary || 'Événement sans titre',
        location: event.location || '',
        start,
        end,
        isAllDay,
      };
    }

    function eventBlockMarkup(event, columnIndex) {
      const startHour = event.start.getHours() + event.start.getMinutes() / 60;
      const endHour = event.end.getHours() + event.end.getMinutes() / 60;
      const visibleStart = Math.max(11, startHour);
      const visibleEnd = Math.min(23, Math.max(visibleStart + 0.25, endHour));
      const top = (visibleStart - 11) * 60;
      const height = Math.max(42, (visibleEnd - visibleStart) * 60);
      const timeText = `${formatHourMinute(event.start)} → ${formatHourMinute(event.end)}`;
      const location = event.location ? `<div class="calendar-event-meta">${event.location}</div>` : '';

      return `
        <div class="calendar-event-block" style="top:${top}px;height:${height}px;" data-col="${columnIndex}">
          <div class="calendar-event-title">${event.summary}</div>
          <div class="calendar-event-meta">${timeText}</div>
          ${location}
        </div>
      `;
    }

    function renderWeekAgenda(events) {
      const weekStart = startOfWeek(startOfToday());
      const weekDays = Array.from({ length: 7 }, (_, i) => addDays(weekStart, i));

      if (calendarRangeLabel) {
        const end = addDays(weekStart, 6);
        calendarRangeLabel.textContent = `Semaine du ${weekStart.toLocaleDateString('fr-FR')} au ${end.toLocaleDateString('fr-FR')}`;
      }

      const normalizedEvents = events.map(normalizeEvent);
      const allDayEvents = normalizedEvents.filter((event) => event.isAllDay);
      const timedEvents = normalizedEvents.filter((event) => !event.isAllDay);

      const header = `
        <div class="calendar-agenda-header week">
          <div class="calendar-agenda-head-cell"></div>
          ${weekDays
            .map(
              (day) => `
                <div class="calendar-agenda-head-cell">
                  <div class="calendar-day-label">${day.toLocaleDateString('fr-FR', { weekday: 'short' })}</div>
                  <div class="calendar-day-date">${day.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' })}</div>
                </div>
              `
            )
            .join('')}
        </div>
      `;

      const allDayRow = allDayEvents.length
        ? `
          <div class="calendar-all-day-row">
            ${allDayEvents
              .map((event) => `<div class="calendar-all-day-chip">${event.summary}</div>`)
              .join('')}
          </div>
        `
        : '';

      const body = `
        <div class="calendar-agenda-body week">
          ${buildTimeColumn()}
          ${weekDays
            .map((day, columnIndex) => {
              const dayEvents = timedEvents.filter((event) => sameDay(event.start, day));
              return `
                <div class="calendar-day-column">
                  <div class="calendar-grid-lines">${buildGridLines()}</div>
                  <div class="calendar-events-layer">
                    ${dayEvents.map((event) => eventBlockMarkup(event, columnIndex)).join('')}
                  </div>
                </div>
              `;
            })
            .join('')}
        </div>
      `;

      googleEventsList.innerHTML = `<div class="calendar-agenda-week">${header}${allDayRow}${body}</div>`;
    }

    function renderDayAgenda(events) {
      const today = startOfToday();
      const normalizedEvents = events.map(normalizeEvent);
      const dayEvents = normalizedEvents.filter((event) => sameDay(event.start, today));
      const allDayEvents = dayEvents.filter((event) => event.isAllDay);
      const timedEvents = dayEvents.filter((event) => !event.isAllDay);

      if (calendarRangeLabel) {
        calendarRangeLabel.textContent = `Vue du ${today.toLocaleDateString('fr-FR', { weekday: 'long', day: '2-digit', month: 'long' })}`;
      }

      const header = `
        <div class="calendar-agenda-header day">
          <div class="calendar-agenda-head-cell"></div>
          <div class="calendar-agenda-head-cell">
            <div class="calendar-day-label">${today.toLocaleDateString('fr-FR', { weekday: 'long' })}</div>
            <div class="calendar-day-date">${today.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' })}</div>
          </div>
        </div>
      `;

      const allDayRow = allDayEvents.length
        ? `
          <div class="calendar-all-day-row">
            ${allDayEvents
              .map((event) => `<div class="calendar-all-day-chip">${event.summary}</div>`)
              .join('')}
          </div>
        `
        : '';

      const body = `
        <div class="calendar-agenda-body day">
          ${buildTimeColumn()}
          <div class="calendar-day-column">
            <div class="calendar-grid-lines">${buildGridLines()}</div>
            <div class="calendar-events-layer">
              ${timedEvents.map((event) => eventBlockMarkup(event, 0)).join('')}
            </div>
          </div>
        </div>
      `;

      googleEventsList.innerHTML = `<div class="calendar-agenda-day">${header}${allDayRow}${body}</div>`;
    }

    function updateCalendarViewButtons() {
      if (calendarWeekBtn) calendarWeekBtn.classList.toggle('active', calendarViewMode === 'week');
      if (calendarDayBtn) calendarDayBtn.classList.toggle('active', calendarViewMode === 'day');
    }

    function renderGoogleEvents(events) {
      if (!googleEventsList) return;

      cachedGoogleEvents = events || [];
      updateCalendarViewButtons();

      if (!cachedGoogleEvents.length) {
        googleEventsList.innerHTML = '<div class="calendar-empty">Aucun événement sur les 7 prochains jours.</div>';
        if (calendarRangeLabel) calendarRangeLabel.textContent = 'Aucun événement à venir';
        return;
      }

      if (calendarViewMode === 'day') {
        renderDayAgenda(cachedGoogleEvents);
        return;
      }

      renderWeekAgenda(cachedGoogleEvents);
    }

    // Existing function loadGoogleCalendarData()
    async function loadGoogleCalendarData() {
      try {
        const response = await fetch('/api/google-calendar');
        if (!response.ok) throw new Error('Erreur lors du chargement des données du calendrier');
        const eventsData = await response.json();
        renderGoogleEvents(eventsData.events || []);
      } catch (error) {
        console.error(error);
      }
    }

    // Existing function bootAuth()
    function bootAuth() {
      if (calendarWeekBtn) {
        calendarWeekBtn.addEventListener('click', () => {
          calendarViewMode = 'week';
          renderGoogleEvents(cachedGoogleEvents);
        });
      }

      if (calendarDayBtn) {
        calendarDayBtn.addEventListener('click', () => {
          calendarViewMode = 'day';
          renderGoogleEvents(cachedGoogleEvents);
        });
      }

      if (connectGoogleBtn) {
        connectGoogleBtn.addEventListener('click', () => {
          // existing connect logic
        });
      }
    }

    // Other existing script content
  </script>
</body>
</html>
