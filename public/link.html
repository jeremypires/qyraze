  <style>
    :root {
      --bg: #FAF8F5;
      --primary: #1F4E46;
      --primary-light: #2A6359;
      --secondary: #C9A96E;
      --text: #1B1B1B;
      --text-muted: #5C5C5C;
      --border: rgba(31, 78, 70, 0.12);
      --card: #FFFFFF;
      --shadow: 0 8px 32px rgba(27, 27, 27, 0.06);
      --font-head: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font-body);
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    .link-top {
      position: absolute;
      top: max(16px, env(safe-area-inset-top));
      right: max(10px, env(safe-area-inset-right));
      display: flex;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(31, 78, 70, 0.06);
      border: 1px solid var(--border);
    }
    .lang-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
    }
    .lang-btn--active { background: var(--primary); color: #fff; }
    .link-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 32px;
      position: relative;
    }
    .link-card {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }
    .link-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--secondary);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .link-name {
      margin: 0 0 6px;
      font-family: var(--font-head);
      font-size: clamp(1.2rem, 4.5vw, 1.6rem);
      font-weight: 700;
      white-space: nowrap;
    }
    .link-title {
      margin: 0 0 14px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
    }
    .link-tagline {
      margin: 0 0 28px;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-muted);
      text-align: center;
      max-width: 32ch;
    }
    .link-actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: auto;
    }
    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 52px;
      padding: 14px 20px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 500;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: border-color 0.2s, transform 0.15s;
    }
    .link-btn-icon {
      display: inline-flex;
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      color: var(--primary);
    }
    .link-btn--primary .link-btn-icon {
      color: #fff;
    }
    .link-btn-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .link-btn:hover { border-color: var(--primary); transform: translateY(-1px); }
    .link-btn--primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      font-weight: 600;
    }
    .link-btn--primary:hover { background: var(--primary-light); }
    .link-footer {
      margin-top: 32px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
