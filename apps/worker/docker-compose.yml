services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
